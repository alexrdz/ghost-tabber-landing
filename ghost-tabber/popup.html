<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostTabber — Ethereal Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style type="text/css">
        /* --- ETHEREAL DESIGN TOKENS --- */
        :root {
            --bg-void: #09090E;
            --ghost-glass: rgba(255, 255, 255, 0.03);
            --ghost-glass-hover: rgba(255, 255, 255, 0.08);
            --ghost-border: rgba(255, 255, 255, 0.08);

            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(255, 255, 255, 0.55);

            --glow-purple: #B088FF;
            --glow-cyan: #00F0FF;

            --space-xs: 0.5rem;
            --space-sm: 1rem;
            --space-md: 1.5rem;
            --space-lg: 2rem;

            --transition-bounce: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --transition-smooth: 0.3s ease;
        }

        /* --- BASE STYLES --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-void);
            color: var(--text-primary);
            width: 400px; /* Standard extension width */
            min-height: 550px;
            position: relative;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- AMBIENT BACKGROUND EFFECTS --- */
        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            z-index: 0;
            pointer-events: none;
            animation: float-orb 10s infinite alternate ease-in-out;
        }
        .orb-1 {
            background: var(--glow-purple);
            width: 200px; height: 200px;
            top: -50px; left: -50px;
        }
        .orb-2 {
            background: var(--glow-cyan);
            width: 150px; height: 150px;
            bottom: -20px; right: -50px;
            animation-delay: -5s;
            opacity: 0.25;
        }

        @keyframes float-orb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 20px) scale(1.1); }
        }

        /* --- MAIN CONTAINER --- */
        .app-container {
            position: relative;
            z-index: 1;
            padding: var(--space-md);
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }

        /* --- GLASS PANELS --- */
        .glass-panel {
            background: var(--ghost-glass);
            border: 1px solid var(--ghost-border);
            border-radius: 16px;
            padding: var(--space-md);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: var(--transition-smooth);
        }

        /* --- TYPOGRAPHY --- */
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fff, var(--glow-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .label-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            font-weight: 500;
            display: block;
            margin-bottom: var(--space-xs);
        }

        .caption {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        /* --- HEADER & GHOST ICON --- */
        header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: var(--space-xs) 0;
        }

        .ghost-icon {
            width: 42px;
            height: 42px;
            animation: levitate 3s infinite ease-in-out;
            filter: drop-shadow(0 0 10px rgba(176, 136, 255, 0.4));
        }

        @keyframes levitate {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* --- STATUS ROW --- */
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-text {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--glow-cyan);
            text-shadow: 0 0 12px rgba(0, 240, 255, 0.3);
        }

        /* --- STATS GRID --- */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-card {
            background: var(--ghost-glass);
            border: 1px solid var(--ghost-border);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1;
            margin: 8px 0;
            color: var(--text-primary);
        }

        /* --- FORM ELEMENTS --- */
        /* Custom Select */
        .select-wrapper {
            position: relative;
            margin-bottom: var(--space-md);
        }

        select {
            appearance: none;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--ghost-border);
            color: var(--text-primary);
            padding: 14px 16px;
            width: 100%;
            font-family: inherit;
            font-size: 0.95rem;
            border-radius: 10px;
            cursor: pointer;
            outline: none;
            transition: var(--transition-smooth);
        }

        select:focus, select:hover {
            border-color: var(--glow-purple);
            box-shadow: 0 0 15px rgba(176, 136, 255, 0.15);
        }

        select option {
            background: #1a1a24;
            color: #fff;
        }

        .select-wrapper::after {
            content: "▾";
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--glow-cyan);
            pointer-events: none;
            font-size: 1.2rem;
        }

        /* Custom Toggle */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 28px;
        }

        .toggle-switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            transition: .4s;
            border: 1px solid var(--ghost-border);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px; width: 20px;
            left: 3px; bottom: 3px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            transition: var(--transition-bounce);
        }

        input:checked + .slider {
            background-color: rgba(0, 240, 255, 0.15);
            border-color: var(--glow-cyan);
            box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.2);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
            background-color: var(--glow-cyan);
            box-shadow: 0 0 10px var(--glow-cyan);
        }

        /* Custom Checkboxes */
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-primary);
            transition: var(--transition-smooth);
        }

        .checkbox-row:hover {
            color: var(--glow-cyan);
        }

        .checkbox-row input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .custom-checkbox {
            height: 20px;
            width: 20px;
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--ghost-border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-bounce);
        }

        .checkbox-row:hover .custom-checkbox {
            border-color: var(--glow-cyan);
        }

        .checkbox-row input:checked ~ .custom-checkbox {
            background-color: var(--glow-cyan);
            border-color: var(--glow-cyan);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
        }

        .custom-checkbox::after {
            content: "";
            display: none;
            width: 4px;
            height: 10px;
            border: solid var(--bg-void);
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            margin-bottom: 2px;
        }

        .checkbox-row input:checked ~ .custom-checkbox::after {
            display: block;
        }

        /* --- BUTTONS --- */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: auto;
        }

        .btn {
            width: 100%;
            padding: 14px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition-bounce);
            outline: none;
            position: relative;
            overflow: hidden;
        }

        .btn:active { transform: scale(0.97); }

        .btn-primary {
            background: linear-gradient(135deg, var(--glow-purple), #7b42f6);
            color: #fff;
            border: none;
            box-shadow: 0 4px 15px rgba(176, 136, 255, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(176, 136, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--ghost-glass);
            border: 1px solid var(--ghost-border);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--ghost-glass-hover);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* --- FOOTER --- */
        footer {
            display: flex;
            justify-content: space-between;
            padding-top: var(--space-sm);
            border-top: 1px solid var(--ghost-border);
        }

        /* Focus States for Accessibility */
        *:focus-visible {
            outline: 2px solid var(--glow-cyan);
            outline-offset: 2px;
        }
    </style>
</head>
<body>

    <!-- Ambient Glow Background -->
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <div class="app-container">

        <!-- Header -->
        <header>
            <svg class="ghost-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 15C33.4315 15 20 28.4315 20 45V85C20 87.7614 22.2386 90 25 90C26.3807 90 27.7046 89.4518 28.6803 88.4761L31.3197 85.8368C33.2723 83.8841 36.4384 83.8841 38.391 85.8368L41.609 89.0547C43.5616 91.0074 46.7277 91.0074 48.6803 89.0547L51.3197 86.4154C53.2723 84.4628 56.4384 84.4628 58.391 86.4154L61.609 89.6333C63.5616 91.586 66.7277 91.586 68.6803 89.6333L71.3197 86.9939C72.2954 86.0182 73.6193 85.4701 75 85.4701C77.7614 85.4701 80 87.7086 80 90.4701V45C80 28.4315 66.5685 15 50 15Z" fill="url(#ghost-grad)"/>
                <circle cx="38" cy="45" r="5" fill="#09090E"/>
                <circle cx="62" cy="45" r="5" fill="#09090E"/>
                <defs>
                    <linearGradient id="ghost-grad" x1="50" y1="15" x2="50" y2="90" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#FFFFFF"/>
                        <stop offset="1" stop-color="#E2D4FF" stop-opacity="0.7"/>
                    </linearGradient>
                </defs>
            </svg>
            <div>
                <h1>GhostTabber</h1>
                <p class="caption">Vanishing your idle tabs.</p>
            </div>
        </header>

        <!-- Status Panel -->
        <div class="glass-panel status-row">
            <div>
                <span class="label-text">Monitoring Status</span>
                <div class="status-text" id="statusText">Active</div>
            </div>
            <label class="toggle-switch">
                <input type="checkbox" id="enabledToggle" checked>
                <span class="slider"></span>
            </label>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <span class="label-text" style="color: var(--glow-purple)">Archived</span>
                <div class="stat-value" id="archivedCount">12</div>
                <span class="caption">Total history</span>
            </div>
            <div class="stat-card">
                <span class="label-text" style="color: var(--glow-cyan)">Observed</span>
                <div class="stat-value" id="monitoredCount">05</div>
                <span class="caption">Live tabs</span>
            </div>
        </div>

        <!-- Configuration Panel -->
        <div class="glass-panel">
            <span class="label-text">Lifespan Parameter</span>
            <div class="select-wrapper">
                <select id="timeoutSelect">
                  <option value="10000">⚡ 10 Seconds (Test)</option>
                  <option value="300000">5 Minutes</option>
                  <option value="600000">10 Minutes</option>
                  <option value="1800000" selected>30 Minutes</option>
                  <option value="3600000">1 Hour</option>
                  <option value="7200000">2 Hours</option>
                  <option value="14400000">4 Hours</option>
                </select>
            </div>

            <span class="label-text">Global Exceptions</span>
            <div class="checkbox-group">
                <label class="checkbox-row">
                    <input type="checkbox" id="excludePinnedCheck">
                    <span class="custom-checkbox"></span>
                    Protect Pinned Tabs
                </label>
                <label class="checkbox-row">
                    <input type="checkbox" id="excludeAudibleCheck">
                    <span class="custom-checkbox"></span>
                    Protect Audible Tabs
                </label>
            </div>
        </div>

        <!-- Interactions -->
        <div class="actions">
            <button id="openArchiveBtn" class="btn btn-primary">Open Archive Index</button>
            <button id="checkNowBtn" class="btn btn-secondary">Force Sweep</button>
        </div>

        <!-- Footer -->
        <footer>
            <span class="label-text" style="margin:0;">v1.0.0</span>
            <span class="label-text" style="margin:0; opacity: 0.4;">GT-SYS_01</span>
        </footer>

    </div>

    <script src="popup.js"></script>
</body>
</html>
