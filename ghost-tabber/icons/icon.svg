<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="ghostGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Ghost body -->
  <path d="M 64 20
           C 44 20, 25 35, 25 55
           L 25 100
           L 35 95
           L 45 100
           L 55 95
           L 64 100
           L 73 95
           L 83 100
           L 93 95
           L 103 100
           L 103 55
           C 103 35, 84 20, 64 20 Z"
        fill="url(#ghostGradient)"/>

  <!-- Eyes -->
  <circle cx="50" cy="55" r="8" fill="white"/>
  <circle cx="78" cy="55" r="8" fill="white"/>

  <!-- Pupils -->
  <circle cx="50" cy="55" r="4" fill="#333"/>
  <circle cx="78" cy="55" r="4" fill="#333"/>

  <!-- Smile -->
  <path d="M 50 70 Q 64 80, 78 70"
        stroke="white"
        stroke-width="3"
        stroke-linecap="round"
        fill="none"/>
</svg>
